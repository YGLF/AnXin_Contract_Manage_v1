version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: contract_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: contract_manage
      MYSQL_USER: contract_user
      MYSQL_PASSWORD: contract123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - contract_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contract_backend
    restart: always
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: contract_user
      MYSQL_PASSWORD: contract123
      MYSQL_DATABASE: contract_manage
      SECRET_KEY: your-secret-key-change-in-production
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - contract_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: contract_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - contract_network

volumes:
  mysql_data:

networks:
  contract_network:
    driver: bridge